<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Archive System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h3 class="text-center mb-4">Login</h3>
                <form id="loginForm">
                    <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
                    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
                    <button class="btn btn-primary w-100">Login</button>
                    <p class="text-center mt-3">Don't have an account? <a href="signup.html">Sign Up</a></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('token', data.token); // Token එක පරිගණකයේ සේව් කරගන්නවා
                window.location.href = "index.html"; // Dashboard එකට යන්න
            } else {
                alert(data);
            }
        });
    </script>
</body>
</html>
