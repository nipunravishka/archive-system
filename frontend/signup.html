<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up - Archive System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h3 class="text-center mb-4">Create Account</h3>
                <form id="signupForm">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                    </div>
                    <button class="btn btn-success w-100 mb-3">Sign Up</button>
                    <p class="text-center">Already have an account? <a href="login.html">Login here</a></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('http://localhost:5000/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            if(res.ok) {
                alert("Account created successfully! Please login.");
                window.location.href = "login.html";
            } else {
                const data = await res.json();
                alert("Error: " + (data.message || "Registration failed"));
            }
        });
    </script>
</body>
</html>
